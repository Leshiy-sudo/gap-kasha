services:
  backend:
    container_name: gapkassa-backend
    build:
      context: ./local-backend
    env_file:
      - ./local-backend/.env
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - gapkassa_data:/data
      - gapkassa_outbox:/app/outbox
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:8080/health", timeout=5)
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  gapkassa_data:
  gapkassa_outbox:
